<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibium Knowledge Graph — Layered View</title>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.161.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.161.0/examples/jsm/"}}</script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{overflow:hidden;overscroll-behavior:none;width:100%;height:100%}
  body{background:#07071a;color:#e2e8f0;font-family:'Inter',system-ui,sans-serif}
  canvas{position:fixed;top:0;left:0;display:block}
  #layer-panel{
    position:absolute;top:10px;left:10px;background:rgba(10,10,28,0.88);
    border:1px solid rgba(148,163,184,0.15);border-radius:8px;padding:12px 14px;
    font-size:11px;z-index:10;width:200px;max-height:90vh;overflow-y:auto;
  }
  #layer-panel h4{font-size:12px;font-weight:700;color:#a78bfa;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
  #hide-panel{font-size:10px;color:#475569;cursor:pointer;font-weight:400}
  #hide-panel:hover{color:#94a3b8}
  .lp-row{margin-bottom:8px}
  .lp-row label{display:flex;align-items:center;gap:6px;color:#94a3b8;cursor:pointer}
  .lp-row input[type=range]{width:100%;accent-color:#7c3aed;margin-top:4px}
  .layer-toggle{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
  .layer-toggle label{display:flex;align-items:center;gap:6px;cursor:pointer;color:#94a3b8}
  .layer-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .lbl-btn{font-size:9px;padding:1px 6px;border-radius:3px;border:1px solid rgba(148,163,184,0.2);background:rgba(255,255,255,0.04);color:#64748b;cursor:pointer}
  .lbl-btn.active{border-color:#7c3aed;color:#a78bfa;background:rgba(124,58,237,0.1)}
  #info-panel{
    position:absolute;top:10px;right:10px;background:rgba(10,10,28,0.92);
    border:1px solid rgba(148,163,184,0.15);border-radius:8px;padding:14px;
    font-size:11px;z-index:10;width:250px;max-height:90vh;overflow-y:auto;display:none;
  }
  #info-panel .node-type{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px}
  #info-panel h3{font-size:13px;font-weight:600;margin-bottom:4px}
  #info-panel .desc{font-size:11px;color:#94a3b8;line-height:1.6;margin-bottom:10px}
  #info-panel .surf-row{display:flex;gap:6px;font-size:10px;margin-bottom:3px}
  #info-panel .surf-row .sl{color:#475569;width:50px;flex-shrink:0}
  #info-panel .surf-row .sv{color:#7dd3fc;font-family:monospace;word-break:break-all}
  #info-close{float:right;background:none;border:none;color:#475569;cursor:pointer;font-size:14px;line-height:1}
  #info-close:hover{color:#94a3b8}
  #controls-hint{position:absolute;bottom:12px;left:12px;font-size:10px;color:#334155}
  .node-label{color:#f1f5f9;background:rgba(7,7,26,0.82);padding:2px 6px;border-radius:3px;font-size:11px;font-weight:500;pointer-events:none;white-space:nowrap;user-select:none;text-shadow:0 1px 3px rgba(0,0,0,0.9);border:1px solid rgba(148,163,184,0.18)}

  @media (max-width: 640px) {
    #layer-panel { width:170px; padding:10px 12px; }
    #info-panel {
      top:auto; bottom:0; right:0; left:0;
      width:100%; max-height:50vh;
      border-radius:12px 12px 0 0;
    }
    #controls-hint { display:none; }
  }
</style>
</head>
<body>

<div id="layer-panel">
  <h4>Layers <span id="hide-panel">Hide ▲</span></h4>
  <div class="lp-row">
    <label>Layer Spacing</label>
    <input type="range" id="spacing" min="40" max="180" value="90">
  </div>
  <div class="lp-row">
    <label><input type="checkbox" id="all-labels"> All Node Labels</label>
  </div>
  <div id="layer-toggles"></div>
</div>

<div id="info-panel">
  <button id="info-close">✕</button>
  <div id="info-content"></div>
</div>

<div id="controls-hint">Rotate: Drag · Zoom: Scroll · Pan: Right-drag</div>

  const node = nodeMap['cat-'+id];

});

// Layer 3: commands clustered around their category's projected position
const catPos = {};
catList.forEach((id,i) => {
  const a = (2*Math.PI*i)/catList.length;
  catPos[id] = {x:110*Math.cos(a), z:110*Math.sin(a)};
});
const cmdBycat = {};
CMD.forEach(c => { if(!cmdBycat[c[1]]) cmdBycat[c[1]]=[]; cmdBycat[c[1]].push('cmd-'+c[0]); });
Object.entries(cmdBycat).forEach(([catId, ids]) => {
  const center = catPos[catId] || {x:0,z:0};
  const r = Math.max(15, Math.sqrt(ids.length)*9);
  ids.forEach((nid, i) => {
    const a = (2*Math.PI*i)/ids.length;
    const node = nodeMap[nid];
    if(node){ node._x = center.x + r*Math.cos(a); node._z = center.z + r*Math.sin(a); }
  });
});

// Layer 4: bugs by surface cluster, patterns at center
const bugSurfAngles = {CLI:0, MCP:Math.PI*2/5, JS:Math.PI*4/5, Python:Math.PI*6/5, Java:Math.PI*8/5};
const bugBySurf = {};
bugPatternNodes.forEach(n => {
  if(n.group==='pattern'){ n._x=(Math.random()-0.5)*40; n._z=(Math.random()-0.5)*40; return; }
  const s = n.surface||'CLI';
  if(!bugBySurf[s]) bugBySurf[s]=[];
  bugBySurf[s].push(n);
});
Object.entries(bugBySurf).forEach(([surf, bugs]) => {
  const baseA = bugSurfAngles[surf]||0;
  const baseR = 90;
  bugs.forEach((bug, i) => {
    const a = baseA + (i - bugs.length/2)*0.3;
    const r = baseR + i*8;
    bug._x = r*Math.cos(a); bug._z = r*Math.sin(a);
  });
});

// Layer 5: fixed bugs + references in a grid/spiral

fixedRefNodes.forEach((n,i) => {
  const r = i===0 ? 0 : 100*Math.sqrt((i+0.5)/fixedRefNodes.length);
  const a = i*phi;
  n._x = r*Math.cos(a); n._z = r*Math.sin(a);
});

function getNodeSize(n) {
  if(n.group==='root') return 6;
  if(n.group==='surface') return 4.5;
  if(n.group==='category') return 3.5;
  if(n.group==='command') return 2;
  if(n.group==='pattern') return 3;
  if(n.group==='bug-open') return 2.5;
  if(n.group==='bug-partial') return 2;
  if(n.group==='bug-regression') return 1.8;
  return 1.8;
}

function getLayerY(layerIdx) {
  return layerIdx * SPACING;
}

function hexToThree(hex) {
  return new THREE.Color(hex);
}

// Create planes
LAYER_DEFS.forEach(layer => {
  const y = getLayerY(layer.id==='root'?0 : layer.id==='surface'?1 : layer.id==='category'?2 : layer.id==='command'?3 : layer.id==='bugs'?4 : 5);
  const r = layer.radius || 100;
  const planeR = r * 1.6 + 40;
  const geo = new THREE.CircleGeometry(planeR, 64);
  const mat = new THREE.MeshBasicMaterial({
    color: new THREE.Color(layer.planeColor),
    transparent: true, opacity: 0.05,
    side: THREE.DoubleSide, depthWrite: false
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = -Math.PI/2;
  mesh.position.y = y;
  mesh.userData.layerId = layer.id;
  scene.add(mesh);
  planeMeshes[layer.id] = mesh;

  // Layer ring edge
  const ringGeo = new THREE.RingGeometry(planeR-0.5, planeR+0.5, 64);
  const ringMat = new THREE.MeshBasicMaterial({color: new THREE.Color(layer.planeColor), transparent:true, opacity:0.25, side:THREE.DoubleSide, depthWrite:false});
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI/2;
  ring.position.y = y;
  ring.userData.layerId = layer.id;
  scene.add(ring);

  // Layer marking label at ring edge
  const lIdx = LAYER_DEFS.indexOf(layer);
  const markDiv = document.createElement('div');
  markDiv.style.cssText = `font-size:11px;font-weight:700;letter-spacing:.07em;color:${layer.color};opacity:0.75;pointer-events:none;user-select:none;white-space:nowrap;text-shadow:0 1px 4px rgba(0,0,0,0.9)`;
  markDiv.textContent = `L${lIdx}  ${layer.label.replace(/^L\d+:\s*/,'')}`;
  const markObj = new CSS2DObject(markDiv);
  markObj.position.set(-(planeR + 16), y, 0);
  markObj.userData.layerId = layer.id;
  scene.add(markObj);
});

// Create node meshes + labels
const sphereGeoCache = {};
function getSphereGeo(r) {
  const k = r.toFixed(1);
  if(!sphereGeoCache[k]) sphereGeoCache[k] = new THREE.SphereGeometry(r, 16, 12);
  return sphereGeoCache[k];
}

allNodes.forEach(node => {
  const layerDef = LAYER_DEFS[node.layer];
  if(!layerDef) return;
  const y = getLayerY(node.layer);
  const r = getNodeSize(node);
  const geo = getSphereGeo(r);
  const mat = new THREE.MeshStandardMaterial({
    color: hexToThree(node.color || '#94a3b8'),
    roughness: 0.4, metalness: 0.1,
    transparent: true, opacity: 1.0
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(node._x || 0, y, node._z || 0);
  mesh.userData.node = node;
  scene.add(mesh);

  // CSS2D label
  const div = document.createElement('div');
  div.className = 'node-label';
  div.textContent = node.name;
  const labelObj = new CSS2DObject(div);
  labelObj.position.set(0, r+1, 0);
  labelObj.visible = false;
  mesh.add(labelObj);

  meshes.push({mesh, node, labelObj, div});
});

// Build edges (root→surf, cat→cmd, cmd→bug, root→ref)
function addEdge(fromNode, toNode, color, opacity) {
  const y0 = getLayerY(fromNode.layer);
  const y1 = getLayerY(toNode.layer);
  const pts = [
    new THREE.Vector3(fromNode._x||0, y0, fromNode._z||0),
    new THREE.Vector3(toNode._x||0, y1, toNode._z||0)
  ];
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({color: new THREE.Color(color), transparent:true, opacity:opacity||0.2});
  const line = new THREE.Line(geo, mat);
  line.userData = {fromId: fromNode.id, toId: toNode.id};
  scene.add(line);
  edgeLines.push(line);
  return line;
}

// root → surfaces
SURFS.forEach(s => addEdge(rootNode, nodeMap[s.id], '#7c3aed', 0.25));
// root → references
fixedRefNodes.filter(n=>n.group==='reference').forEach(n => addEdge(rootNode, n, '#475569', 0.15));
// categories → commands
CMD.forEach(c => {
  const catNode = nodeMap['cat-'+c[1]];
  const cmdNode = nodeMap['cmd-'+c[0]];
  if(catNode && cmdNode) addEdge(catNode, cmdNode, CATEGORIES[c[1]]?.color||'#94a3b8', 0.12);
});
// commands → open bugs
bugPatternNodes.filter(n=>n.group==='bug-open'||n.group==='bug-partial').forEach(bugNode => {
  // find commands that reference this bug
  allNodes.filter(n=>n.group==='command').forEach(cmd => {
    if(cmd.openBugs && cmd.openBugs.includes(bugNode.id)) {
      addEdge(cmd, bugNode, bugNode.color||'#ef4444', 0.15);
    }
  });
});

// ─── RAYCASTING ───────────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let selectedMesh = null;
let selectedOrigColor = null;

function deselectAll() {
  meshes.forEach(({mesh, node}) => {
    mesh.material.color.set(hexToThree(node.color||'#94a3b8'));
    mesh.material.opacity = 1.0;
    mesh.material.emissive.set(0x000000);
    mesh.material.emissiveIntensity = 0;
  });
  edgeLines.forEach(l => { l.material.opacity = 0.15; });
  selectedMesh = null;
  document.getElementById('info-panel').style.display='none';
}

function selectNode(item) {
  deselectAll();
  selectedMesh = item.mesh;
  const node = item.node;

  // Highlight selected
  item.mesh.material.emissive.set(hexToThree(node.color||'#7c3aed'));
  item.mesh.material.emissiveIntensity = 0.4;

  // Dim others
  meshes.forEach(({mesh, node:n}) => {
    if(mesh !== item.mesh) { mesh.material.opacity = 0.3; }
  });

  // Highlight connected edges
  const connectedIds = new Set([node.id]);
  edgeLines.forEach(l => {
    const {fromId, toId} = l.userData;
    if(fromId===node.id || toId===node.id) {
      l.material.opacity = 0.8;
      connectedIds.add(fromId); connectedIds.add(toId);
    }
  });

  // Restore connected node opacity
  meshes.forEach(({mesh, node:n}) => {
    if(connectedIds.has(n.id)) mesh.material.opacity = 1.0;
  });

  // Show info panel
  showInfo(node);
}

function showInfo(node) {
  const panel = document.getElementById('info-panel');
  const typeColors = {
    root:'#7c3aed', surface:'#3b82f6', category:'#0ea5e9', command:'#94a3b8',
    'bug-open':'#ef4444','bug-partial':'#fbbf24','bug-fixed':'#22c55e',
    'bug-regression':'#a78bfa', pattern:'#d946ef', reference:'#475569'
  };
  const tc = typeColors[node.group]||'#94a3b8';
  let html = `<div class="node-type" style="background:${tc}22;color:${tc};border:1px solid ${tc}55">${node.group}</div>
    <h3>${node.name}</h3>`;
  if(node.desc) html += `<div class="desc">${node.desc}</div>`;
  if(node.group==='command') {
    html += `<div style="margin-top:8px">`;
    [['CLI',node.cli],['MCP',node.mcp],['JS',node.js],['Python',node.py],['Java',node.java]]
      .forEach(([l,v]) => {
        html += `<div class="surf-row"><span class="sl">${l}</span><span class="sv">${v||'—'}</span></div>`;
      });
    html += `</div>`;
    if(node.openBugs?.length) html += `<div style="margin-top:8px;font-size:10px;color:#ef4444">⚠ ${node.openBugs.join(', ')}</div>`;
    if(node.fixedBugs?.length) html += `<div style="font-size:10px;color:#22c55e">✓ ${node.fixedBugs.join(', ')}</div>`;
  }
  if(node.workaround) html += `<div style="margin-top:8px;background:rgba(124,58,237,0.08);border-left:2px solid #7c3aed;padding:6px 8px;font-size:10px;color:#cbd5e1;font-family:monospace;white-space:pre-wrap">${node.workaround}</div>`;
  document.getElementById('info-content').innerHTML = html;
  panel.style.display = 'block';
}

window.addEventListener('click', e => {
  if(e.target.closest('#layer-panel')||e.target.closest('#info-panel')) return;
  pointer.x = (e.clientX/window.innerWidth)*2-1;
  pointer.y = -(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(meshes.map(m=>m.mesh));
  if(hits.length) {
    const item = meshes.find(m=>m.mesh===hits[0].object);
    if(item) { if(selectedMesh===item.mesh) deselectAll(); else selectNode(item); }
  } else {
    deselectAll();
  }
  // Drain any micro-drag velocity OrbitControls accumulated during the tap/click.
  // Disabling damping for one update() call zeroes sphericalDelta immediately,
  // so it doesn't linger and make the camera appear to follow the cursor.
  const wasDamping = controls.enableDamping;
  controls.enableDamping = false;
  controls.update();
  controls.enableDamping = wasDamping;
});

// ─── LABEL VISIBILITY ────────────────────────────────────────────────────────
function updateLabels() {
  meshes.forEach(({node, labelObj}) => {
    const lId = LAYER_DEFS[node.layer]?.id;
    labelObj.visible = allLabels || !!(lId && layerLabels[lId]);
  });
}

// ─── LAYER TOGGLE UI ─────────────────────────────────────────────────────────
const togglesDiv = document.getElementById('layer-toggles');
LAYER_DEFS.forEach(layer => {
  const row = document.createElement('div');
  row.className = 'layer-toggle';
  row.innerHTML = `
    <label>
      <input type="checkbox" data-layer="${layer.id}" checked>
      <span class="layer-dot" style="background:${layer.color}"></span>
      ${layer.label}
    </label>
    <button class="lbl-btn${layerLabels[layer.id]?' active':''}" data-layer-lbl="${layer.id}" title="Toggle node name labels for this layer">Labels</button>`;
  togglesDiv.appendChild(row);
});

document.getElementById('layer-toggles').addEventListener('change', e => {
  const lid = e.target.dataset.layer;
  if(!lid) return;
  layerVisible[lid] = e.target.checked;
  const layerDef = LAYER_DEFS.find(l=>l.id===lid);
  if(!layerDef) return;
  const layerIdx = LAYER_DEFS.indexOf(layerDef);
  meshes.forEach(({mesh, node}) => {
    if(node.layer===layerIdx) mesh.visible = layerVisible[lid];
  });
  if(planeMeshes[lid]) {
    planeMeshes[lid].visible = layerVisible[lid];
    planeMeshes[lid].parent?.children.forEach(c => {
      if(c.userData.layerId===lid) c.visible = layerVisible[lid];
    });
  }
  // toggle plane and ring
  scene.children.forEach(c => {
    if(c.userData?.layerId===lid) c.visible = layerVisible[lid];
  });
  updateLabels();
});

document.getElementById('layer-toggles').addEventListener('click', e => {
  const lid = e.target.dataset.layerLbl;
  if(!lid) return;
  layerLabels[lid] = !layerLabels[lid];
  e.target.classList.toggle('active', layerLabels[lid]);
  updateLabels();
});

document.getElementById('all-labels').addEventListener('change', e => {
  allLabels = e.target.checked;
  updateLabels();
});

// tag planes with layerId for visibility toggle
LAYER_DEFS.forEach((layer, i) => {
  if(planeMeshes[layer.id]) planeMeshes[layer.id].userData.layerId = layer.id;
});

// ─── SPACING SLIDER ───────────────────────────────────────────────────────────
document.getElementById('spacing').addEventListener('input', e => {
  SPACING = +e.target.value;
  // Reposition all meshes and planes
  meshes.forEach(({mesh, node}) => {
    mesh.position.y = getLayerY(node.layer);
  });
  LAYER_DEFS.forEach((layer, i) => {
    const y = getLayerY(i);
    const p = planeMeshes[layer.id];
    if(p) p.position.y = y;
    scene.children.forEach(c => {
      if(c.userData?.layerId===layer.id && (c.geometry?.type==='RingGeometry' || c.isCSS2DObject)) c.position.y=y;
    });
  });
  // Rebuild edge geometry
  edgeLines.forEach(line => {
    const {fromId, toId} = line.userData;
    const fn = nodeMap[fromId], tn = nodeMap[toId];
    if(!fn||!tn) return;
    const pts = [
      new THREE.Vector3(fn._x||0, getLayerY(fn.layer), fn._z||0),
      new THREE.Vector3(tn._x||0, getLayerY(tn.layer), tn._z||0)
    ];
    line.geometry.setFromPoints(pts);
  });
  controls.target.set(0, SPACING*2.5, 0);
});

// ─── HIDE PANEL ──────────────────────────────────────────────────────────────
let panelHidden = false;
if (window.innerWidth < 640) {
  panelHidden = true;
  document.querySelectorAll('#layer-panel > *:not(h4)').forEach(el => { el.style.display = 'none'; });
  document.getElementById('hide-panel').textContent = 'Show ▼';
}
document.getElementById('hide-panel').addEventListener('click', () => {
  panelHidden = !panelHidden;
  document.querySelectorAll('#layer-panel > *:not(h4)').forEach(el => {
    el.style.display = panelHidden ? 'none' : '';
  });
  document.getElementById('hide-panel').textContent = panelHidden ? 'Show ▼' : 'Hide ▲';
});

// ─── INFO CLOSE ──────────────────────────────────────────────────────────────
document.getElementById('info-close').addEventListener('click', deselectAll);

// ─── RESIZE ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── TEST HOOKS (module-scope → window) ──────────────────────────────────────
window._LG = {
  get allLabels() { return allLabels; },
  get SPACING()   { return SPACING; },
  meshes, layerVisible, layerLabels, scene, nodeMap, allNodes,
  LAYER_DEFS, planeMeshes, edgeLines,
  camera, controls,
  selectNode, deselectAll,
  getMesh: id => meshes.find(m => m.node.id === id),
  dist: () => { const t=controls.target,p=camera.position,dx=p.x-t.x,dy=p.y-t.y,dz=p.z-t.z; return Math.sqrt(dx*dx+dy*dy+dz*dz); },
  resetCamera: () => {
    const wasDamping = controls.enableDamping;
    controls.enableDamping = false;
    controls.update();                        // drain any residual sphericalDelta (zeroed when damping off)
    camera.position.set(0,550,900); controls.target.set(0,225,0);
    controls.update();                        // re-read clean position; delta is zero → camera stays put
    controls.enableDamping = wasDamping;
  },
};

updateLabels();

// ─── ANIMATE ─────────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
